    border-radius: 12px;
    text-decoration: none;

    transition: all 0.25s ease;

  .report-card:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(167,139,250,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .report-card .date-badge {

    width: 64px;
    height: 64px;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-right: 20px;
  }
  .date-badge .month { font-size: 12px; opacity: 0.8; }
  .date-badge .day { font-size: 22px; font-weight: 700; }
  .report-info h3 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #f0f4ff;
  }
  .report-info .meta {
    font-size: 13px;
    color: #8b9dc3;
  }
  .report-card .arrow {
    margin-left: auto;
    font-size: 20px;
    color: #6b7db3;
    transition: transform 0.2s;
  }
  .report-card:hover .arrow {
    transform: translateX(4px);
    color: #a78bfa;
  }
  .footer {
