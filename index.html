<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舆情资讯汇总 · WeGame 运营团队</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0c1426 0%, #141e33 50%, #1a1a3e 100%);
    min-height: 100vh;
    color: #e0e6f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 600px;
    width: 100%;
    padding: 40px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .header .subtitle {
    font-size: 15px;
    color: #8b9dc3;
    letter-spacing: 2px;
  }
  .card-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .card {
    display: flex;
    align-items: center;
    padding: 28px 32px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1; }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    border-color: transparent;
  }
  .card-mingchao::before {
    background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(96,165,250,0.1));
  }
  .card-mingchao:hover {
    border-color: rgba(167,139,250,0.3);
  }
  .card-yingzhiren::before {
    background: linear-gradient(135deg, rgba(33,147,176,0.1), rgba(109,213,237,0.1));
  }
  .card-yingzhiren:hover {
    border-color: rgba(109,213,237,0.3);
  }
  .card-icon {
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 24px;
    font-size: 32px;
    position: relative;
    z-index: 1;
  }
  .card-mingchao .card-icon {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    box-shadow: 0 4px 16px rgba(139,92,246,0.3);
  }
  .card-yingzhiren .card-icon {
    background: linear-gradient(135deg, #2193b0, #6dd5ed);
    box-shadow: 0 4px 16px rgba(33,147,176,0.3);
  }
  .card-content {
    position: relative;
    z-index: 1;
    flex: 1;
  }
  .card-content h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #f0f4ff;
  }
  .card-content .desc {
    font-size: 14px;
    color: #8b9dc3;
    line-height: 1.5;
  }
  .card-content .count {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .card-mingchao .count {
    background: rgba(139,92,246,0.15);
    color: #c4b5fd;
  }
  .card-yingzhiren .count {
    background: rgba(33,147,176,0.15);
    color: #6dd5ed;
  }
  .card .arrow {
    position: relative;
    z-index: 1;
    margin-left: 16px;
    font-size: 24px;
    color: #4a5a7a;
    transition: all 0.2s;
  }
  .card:hover .arrow {
    transform: translateX(4px);
  }
  .card-mingchao:hover .arrow { color: #a78bfa; }
  .card-yingzhiren:hover .arrow { color: #6dd5ed; }
  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 13px;
    color: #4a5a7a;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>舆情资讯汇总</h1>
    <p class="subtitle">WeGame 运营团队</p>
  </div>

  <div class="card-grid">
    <a href="mingchao/" class="card card-mingchao">
      <div class="card-icon">🌊</div>
      <div class="card-content">
        <h2>鸣潮 · 舆情简报</h2>
        <p class="desc">鸣潮游戏舆情监控与社媒资讯汇总</p>
        <span class="count">5 期</span>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>

    <a href="yingzhiren/" class="card card-yingzhiren">
      <div class="card-icon">⚔️</div>
      <div class="card-content">
        <h2>影之刃零 · 资讯汇总</h2>
        <p class="desc">影之刃零资讯双周报与社媒舆情采集</p>
        <span class="count">3 期</span>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
  </div>

  <div class="footer">
    <p>&copy; 2026 WeGame 运营团队</p>
  </div>
</div>
</body>
</html>
